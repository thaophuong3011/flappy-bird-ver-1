        this.hudScore.textContent = '0';
        this.lastPipeTime = performance.now();
        Stats.recordPlay();
      }

      _triggerRevive() {
        this.hasRevived = true;
        this.invulnerableFrames = 150; // 2.5 seconds of invincibility at 60fps
        
        // Boost bird up
        this.bird.y = Math.min(this.bird.y, CANVAS_H - GROUND_H - 60);
        this.bird.vy = JUMP_VEL;

        // Clear pipes for a clean slate
        this.pipes = [];
        this.lastPipeTime = performance.now();

        // Flash screen white
        this.flashEl.style.opacity = '1';
        setTimeout(() => { this.flashEl.style.opacity = '0'; }, 300);

        this.floatingTexts.push(
            new FloatingText(this.bird.x + 20, this.bird.y - 30, 'REVIVED!', '#00e5ff', 12)
        );
        this.sound.playPerfect();
      }

      _gameOver() {
        if (!this.bird.alive) return;
        this.bird.alive = false;
        this.state = STATES.GAMEOVER;
        this.sound.playHit();

        // Update stats locally
        Stats.recordDeath();
        Stats.recordScore(this.score);
        this.hiScore = Stats.bestScore;

        // Sync to server in background
        Stats.syncToServer();

        // ── Daily challenge progress push (one POST per game-over) ──
        this.dailyMgr.pushResult({
          score: this.score,
          combo: this.combo,
        });

        for (let i = 0; i < 18; i++) this.particles.push(new Particle(this.bird.x, this.bird.y));

        this.shakeFrames = 18;
        this.shakeIntensity = 7;

        this.flashEl.style.opacity = '0.9';
        setTimeout(() => { this.flashEl.style.opacity = '0'; }, 80);

        setTimeout(() => {
          this.overlayGameover.classList.remove('hidden');
          this.finalScore.textContent = this.score;
          this.highScoreEl.textContent = this.hiScore;
          this.medalArea.textContent = this._getMedal(this.score);
        }, 600);
      }

      _getMedal(score) {
        if (score >= 40) return '🏆';
        if (score >= 20) return '🥇';
        if (score >= 10) return '🥈';
        if (score >= 5)  return '🥉';
        return '🏅';
      }

      // ─── SCORE ─────────────────────────────────────────────────────────
      _addPoint(perfect = false) {
        let pts = 1;

        if (perfect) {
          // Increment combo (capped)
          this.combo = Math.min(this.combo + 1, COMBO_MAX);
          Stats.recordCombo(this.combo);
          // Score multiplier: +1 base bonus + 0.2 per combo level
          pts = Math.round(1 * (1 + this.combo * 0.2));

          // Floating label
          const label = this.combo > 1
            ? `PERFECT \u00d7${this.combo}`
            : 'PERFECT!';
          this.floatingTexts.push(
            new FloatingText(BIRD_X + 50, this.bird.y - 22, label, '#FFD700', 11)
          );
          // Bonus points label (only when > 1)
          if (pts > 1) {
            this.floatingTexts.push(
              new FloatingText(BIRD_X + 50, this.bird.y - 44, `+${pts}`, '#7fffb3', 9)
            );
          }
          this.sound.playPerfect();
        } else {
          this.combo = 0;
          this.sound.playScore();
        }

        this.score += pts;
        this.hudScore.textContent = this.score;
        this.hudScore.classList.remove('pop');
        void this.hudScore.offsetWidth;
        this.hudScore.classList.add('pop');
        setTimeout(() => this.hudScore.classList.remove('pop'), 150);
      }

      // ─── MAIN LOOP ─────────────────────────────────────────────────────
      _loop(timestamp) {
        const dt = Math.min(timestamp - this.lastTime, 50);
        this.lastTime = timestamp;
        this._update(timestamp, dt);
        this._render();
        requestAnimationFrame(ts => this._loop(ts));
      }

      _update(timestamp, dt) {
        if (this._inputLocked) this._inputLocked = false;

        this.env.update(this.state, dt);
        this.bird.update(this.state, dt);

        if (this.state === STATES.MENU) {
          this.menuRenderer.update(dt);
          return;
        }

        if (this.state === STATES.LEADERBOARD) {
          this.lbRenderer.update(dt);
          return;
        }

        if (this.state === STATES.DAILY) {
          this.dailyRenderer.update(dt);
          return;
        }

        if (this.state !== STATES.PLAYING) {
          this.particles.forEach(p => p.update());
          this.particles = this.particles.filter(p => !p.isDead());
          return;
        }

        // Spawn pipes
        if (timestamp - this.lastPipeTime > PIPE_INTERVAL) {
          this.pipes.push(new Pipe(CANVAS_W + 20));
          this.lastPipeTime = timestamp;
        }

        // Update pipes & check score
        this.pipes.forEach(p => {
          p.update();
          if (p.isPassed(this.bird.x + 16)) {
            p.scored = true;
            const perfect = p.isPerfect(this.bird.y);
            this._addPoint(perfect);
          }
        });
        this.pipes = this.pipes.filter(p => !p.isOffScreen());

        // Floating texts
        this.floatingTexts.forEach(t => t.update());
        this.floatingTexts = this.floatingTexts.filter(t => !t.isDead());

        // Particles
        this.particles.forEach(p => p.update());
        this.particles = this.particles.filter(p => !p.isDead());

        // Immunity check
        if (this.invulnerableFrames > 0) {
          this.invulnerableFrames--;
          // Avoid falling off the bottom while invulnerable (bounce instead)
          if (this.bird.y + this.bird.radius >= CANVAS_H - GROUND_H) {
            this.bird.y = CANVAS_H - GROUND_H - this.bird.radius;
            this.bird.jump();
          }
        } else {
          let crashed = false;
          // Collision: ground
          if (this.bird.y + this.bird.radius >= CANVAS_H - GROUND_H) {
             this.bird.y = CANVAS_H - GROUND_H - this.bird.radius;
             crashed = true;
          }
          // Collision: ceiling
          else if (this.bird.y - this.bird.radius <= 0) {
             this.bird.y = this.bird.radius;
             crashed = true;
          }
          // Collision: pipes
          else {
             for (const p of this.pipes) {
               if (p.collides(this.bird)) {
                 crashed = true;
                 break;
               }
             }
          }

          if (crashed) {
             if (this.score >= 40 && !this.hasRevived) {
                this._triggerRevive();
             } else {
                this._gameOver();
                return;
             }
          }
        }

        if (this.shakeFrames > 0) this.shakeFrames--;
      }

      _render() {
        const ctx = this.ctx;

        ctx.save();
        if (this.shakeFrames > 0) {
          const s = this.shakeIntensity * (this.shakeFrames / 18);
          ctx.translate(
            (Math.random() - 0.5) * s,
            (Math.random() - 0.5) * s
          );
        }

        ctx.clearRect(-10, -10, CANVAS_W + 20, CANVAS_H + 20);

        this.env.draw(ctx);
        this.pipes.forEach(p => p.draw(ctx));
        this.particles.forEach(p => p.draw(ctx));

        // Blink bird if invulnerable
        if (this.invulnerableFrames > 0 && Math.floor(performance.now() / 60) % 2 === 0) {
           ctx.globalAlpha = 0.3;
        }
        this.bird.draw(ctx);
        ctx.globalAlpha = 1.0;

        // Floating PERFECT / +N texts
        this.floatingTexts.forEach(t => t.draw(ctx));

        // Combo HUD (top-right, only during play)
        if (this.state === STATES.PLAYING && this.combo > 0) {
          this._drawComboHUD(ctx);
        }

        // Draw MENU overlay on top of game scene
        if (this.state === STATES.MENU) {
          this.menuRenderer.draw(ctx, this.selectedSkinIdx);
        }

        // Draw LEADERBOARD panel
        if (this.state === STATES.LEADERBOARD) {
          this.lbRenderer.draw(ctx, ApiClient.username);
        }

        // Draw DAILY CHALLENGE panel
        if (this.state === STATES.DAILY) {
          this.dailyRenderer.draw(ctx);
        }

        ctx.restore();
      }

      // Pulsing combo badge — top-right corner
      _drawComboHUD(ctx) {
        ctx.save();
        const pulse = 0.85 + 0.15 * Math.sin(performance.now() * 0.008);
        ctx.globalAlpha = pulse;
        ctx.textAlign   = 'right';
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur  = 6;

        // Combo tier colour: white → yellow → orange → red
        const pct = this.combo / COMBO_MAX;
        const r = Math.round(255);
        const g = Math.round(255 * (1 - pct * 0.7));
        const b = Math.round(80  * (1 - pct));
        ctx.fillStyle = `rgb(${r},${g},${b})`;

        ctx.font = `bold 9px "Press Start 2P", monospace`;
        ctx.fillText(`\u00d7${this.combo} COMBO`, CANVAS_W - 14, 72);
        ctx.restore();
      }
    }

    // ─── BOOT ──────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      // roundRect polyfill for older browsers
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
          r = Math.min(r, w / 2, h / 2);
          this.beginPath();
          this.moveTo(x + r, y);
          this.arcTo(x + w, y, x + w, y + h, r);
          this.arcTo(x + w, y + h, x, y + h, r);
          this.arcTo(x, y + h, x, y, r);
          this.arcTo(x, y, x + w, y, r);
          this.closePath();
          return this;
        };
      }

      // ── Username modal logic ─────────────────────────────────────────────────
      const modal    = document.getElementById('username-modal');
      const input    = document.getElementById('username-input');
      const submitBtn = document.getElementById('username-submit');
      const errorEl  = document.getElementById('username-error');
      const statusEl = document.getElementById('modal-status');

      const savedUsername = localStorage.getItem('flappy_username');

      async function bootGame() {
        // Load server data into localStorage, then start game
        await Stats.loadFromServer();
        new Game();
      }

      if (savedUsername) {
        // Already have a username — restore token and go straight to game
        const savedToken = localStorage.getItem('flappy_token');
        if (savedToken) {
          ApiClient._username = savedUsername;
          ApiClient._token    = savedToken;
        }
        modal.classList.add('hidden');
        bootGame();
      } else {
        // Show modal — user must enter a username
        modal.classList.remove('hidden');
        input.focus();

        async function handleSubmit() {
          const raw = input.value.trim();
          if (!raw) { errorEl.textContent = 'Please enter a username'; return; }
          if (raw.length < 2) { errorEl.textContent = 'Too short (min 2 chars)'; return; }
          if (!/^[a-zA-Z0-9_-]+$/.test(raw)) {
            errorEl.textContent = 'Letters, numbers, _ and - only';
            return;
          }
          errorEl.textContent = '';
          submitBtn.disabled = true;
          statusEl.textContent = 'Connecting…';

          try {
            await ApiClient.createOrLogin(raw);
            statusEl.textContent = `Welcome, ${ApiClient.username}!`;
            await new Promise(r => setTimeout(r, 500));
            modal.classList.add('hidden');
            bootGame();
          } catch (err) {
            // Server offline or validation error — still allow offline play
            submitBtn.disabled = false;
            if (err.message.includes('fetch') || err.message.includes('Failed')) {
              // Network error — save username locally and play offline
              const fallback = raw.toLowerCase();
              localStorage.setItem('flappy_username', fallback);
              ApiClient._username = fallback;
              ApiClient._online   = false;
              statusEl.textContent = '';
              errorEl.textContent  = 'Server offline — playing locally';
              await new Promise(r => setTimeout(r, 800));
              modal.classList.add('hidden');
              bootGame();
            } else {
              statusEl.textContent = '';
              errorEl.textContent  = err.message;
            }
          }
        }

        submitBtn.addEventListener('click', handleSubmit);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
      }
    });
  </script>
</body>

</html>
